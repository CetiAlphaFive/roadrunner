url: https://cetialphafive.github.io/roadrunner/
destination: docs
template:
  bootstrap: 5

reference:
- title: "MARS: ares()"
  desc: "Fast MARS with GCV / CV pruning, autotune, bagging, weights, families, and prediction intervals."
  contents:
  - ares
  - predict.ares
  - print.ares
  - summary.ares
  - plot.ares
- title: "KRLS: krls()"
  desc: "Kernel Regularized Least Squares with closed-form LOO lambda selection and marginal effects."
  contents:
  - krls
  - plot.krls_rr
  - slim_krls
  - unslim_krls
  - get_landmarks
- title: "Causal ensemble: meep()"
  desc: "Cross-fitted ensemble of ares() and krls() for DML and causal-forest nuisance estimation."
  contents:
  - meep
  - predict.meep
- title: "Package"
  contents:
  - roadrunner-package

navbar:
  structure:
    left:  [intro, reference, news]
    right: [search, github]
