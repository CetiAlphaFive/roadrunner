url: https://cetialphafive.github.io/roadrunner/
destination: docs
template:
  bootstrap: 5

reference:
- title: "MARS: ares()"
  desc: "Fast MARS with GCV / CV pruning, autotune, bagging, weights, families, and prediction intervals."
  contents:
  - ares
  - predict.ares
  - print.ares
  - summary.ares
  - plot.ares
- title: "KRLS: krls()"
  desc: "Kernel Regularized Least Squares with closed-form LOO lambda selection and marginal effects."
  contents:
  - krls
  - plot.krls_rr
  - slim_krls
  - unslim_krls
  - get_landmarks
- title: "Causal ensemble: meep()"
  desc: "Cross-fitted ensemble of ares() and krls() for DML and causal-forest nuisance estimation."
  contents:
  - meep
  - predict.meep
- title: "Penalized LDA: plda()"
  desc: "Penalized Fisher's linear discriminant (Witten & Tibshirani 2011) with L1 and fused-lasso penalties, multi-class, and CV autotune."
  contents:
  - plda
  - predict.plda
  - print.plda
  - summary.plda
  - plot.plda
- title: "Linear models: ols()"
  desc: "Ordinary and weighted least squares with classical and HC robust standard errors, bagging, and prediction intervals."
  contents:
  - ols
  - predict.ols
  - print.ols
  - summary.ols
  - plot.ols
- title: "Boosted GAM: bgam()"
  desc: "Component-wise P-spline gradient boosting (gamboost-style) with weights, bagging, and CV mstop autotune. Gaussian and binomial families."
  contents:
  - bgam
  - predict.bgam
  - print.bgam
  - summary.bgam
  - plot.bgam
- title: "Logistic regression: logreg()"
  desc: "Binary logistic regression by IRLS with classical and HC robust standard errors and bagging."
  contents:
  - logreg
  - predict.logreg
  - print.logreg
  - summary.logreg
  - plot.logreg
- title: "Package"
  contents:
  - roadrunner-package

navbar:
  structure:
    left:  [intro, reference, news]
    right: [search, github]
